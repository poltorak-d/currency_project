name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Test Backend ─────────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        working-directory: backend
        run: pip install fastapi uvicorn pydantic pydantic-settings httpx redis sqlalchemy asyncpg pytest pytest-asyncio pytest-mock

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v

  # ── Deploy Backend ──────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (FastAPI)
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          cd backend
          zip -r ../backend.zip . \
            --exclude="*.pyc" \
            --exclude="__pycache__/*" \
            --exclude=".pytest_cache/*" \
            --exclude="*.egg-info/*" \
            --exclude=".env" \
            --exclude="tests/*"

      - name: Deploy to App Service
        env:
          PROFILE: ${{ secrets.BACKEND_PUBLISH_PROFILE }}
        run: |
          SCM=$(echo "$PROFILE" | grep -oP 'publishUrl="\K[^"]+' | head -1 | sed 's/:443//')
          USER=$(echo "$PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
          PASS=$(echo "$PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)

          # Wait for any in-progress deployment (Oryx build) to finish first
          echo "Waiting for any previous deployment to complete..."
          for i in $(seq 1 36); do
            STATUS=$(curl -s -u "${USER}:${PASS}" \
              "https://${SCM}/api/deployments/latest" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',4))" \
              2>/dev/null || echo "4")
            echo "  Deployment status: ${STATUS}"
            [[ "$STATUS" == "2" || "$STATUS" == "3" || "$STATUS" == "4" ]] && break
            sleep 10
          done

          # Deploy with retry
          for i in 1 2 3; do
            echo "Deploy attempt ${i}..."
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "https://${SCM}/api/zipdeploy" \
              -u "${USER}:${PASS}" \
              -H "Content-Type: application/zip" \
              --data-binary @backend.zip \
              --max-time 300)
            echo "HTTP ${CODE}"
            [[ "$CODE" == "200" || "$CODE" == "202" ]] && exit 0
            [ $i -lt 3 ] && sleep 150
          done
          exit 1

  # ── Deploy Frontend ─────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (React + Express)
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.BACKEND_URL }}
        run: npm run build

      - name: Prune dev dependencies
        working-directory: frontend
        run: npm prune --production

      - name: Create deployment package
        run: |
          cd frontend
          zip -r ../frontend.zip \
            dist/ \
            server.cjs \
            package.json \
            node_modules/

      - name: Deploy to App Service
        env:
          PROFILE: ${{ secrets.FRONTEND_PUBLISH_PROFILE }}
        run: |
          SCM=$(echo "$PROFILE" | grep -oP 'publishUrl="\K[^"]+' | head -1 | sed 's/:443//')
          USER=$(echo "$PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
          PASS=$(echo "$PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)

          for i in 1 2 3; do
            echo "Deploy attempt ${i}..."
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              "https://${SCM}/api/zipdeploy" \
              -u "${USER}:${PASS}" \
              -H "Content-Type: application/zip" \
              --data-binary @frontend.zip \
              --max-time 300)
            echo "HTTP ${CODE}"
            [[ "$CODE" == "200" || "$CODE" == "202" ]] && exit 0
            [ $i -lt 3 ] && sleep 30
          done
          exit 1
