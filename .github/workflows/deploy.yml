name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── Test Backend ─────────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        working-directory: backend
        run: pip install fastapi uvicorn pydantic pydantic-settings httpx redis sqlalchemy asyncpg pytest pytest-asyncio pytest-mock

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v

  # ── Deploy Backend ──────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (FastAPI)
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          cd backend
          zip -r ../backend.zip . \
            --exclude="*.pyc" \
            --exclude="__pycache__/*" \
            --exclude=".pytest_cache/*" \
            --exclude="*.egg-info/*" \
            --exclude=".env"

      - name: Deploy to App Service
        uses: Wandalen/wretry.action@v3
        with:
          action: azure/webapps-deploy@v3
          with: |
            app-name: ${{ secrets.BACKEND_APP_NAME }}
            publish-profile: ${{ secrets.BACKEND_PUBLISH_PROFILE }}
            package: backend.zip
          attempt_limit: 3
          attempt_delay: 30000

  # ── Deploy Frontend ─────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (React + Express)
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.BACKEND_URL }}
        run: npm run build

      - name: Prune dev dependencies
        working-directory: frontend
        run: npm prune --production

      - name: Create deployment package
        run: |
          cd frontend
          zip -r ../frontend.zip \
            dist/ \
            server.cjs \
            package.json \
            node_modules/

      - name: Deploy to App Service
        uses: Wandalen/wretry.action@v3
        with:
          action: azure/webapps-deploy@v3
          with: |
            app-name: ${{ secrets.FRONTEND_APP_NAME }}
            publish-profile: ${{ secrets.FRONTEND_PUBLISH_PROFILE }}
            package: frontend.zip
          attempt_limit: 3
          attempt_delay: 30000
