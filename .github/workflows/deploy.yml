name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Test Backend ─────────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        working-directory: backend
        run: pip install fastapi uvicorn pydantic pydantic-settings httpx redis sqlalchemy asyncpg pytest pytest-asyncio pytest-mock

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v

  # ── Deploy Backend ──────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (FastAPI)
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          cd backend
          zip -r ../backend.zip . \
            --exclude="*.pyc" \
            --exclude="__pycache__/*" \
            --exclude=".pytest_cache/*" \
            --exclude="*.egg-info/*" \
            --exclude=".env" \
            --exclude="tests/*"

      - name: Deploy to App Service
        env:
          PROFILE: ${{ secrets.BACKEND_PUBLISH_PROFILE }}
        run: |
          SCM=$(echo "$PROFILE" | grep -oP 'publishUrl="\K[^"]+' | head -1 | sed 's/:443//')
          USER=$(echo "$PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
          PASS=$(echo "$PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)

          # Submit async zip deploy — returns 202 immediately, avoiding proxy timeout
          echo "Submitting deployment..."
          RESPONSE=$(curl -si -X POST \
            "https://${SCM}/api/zipdeploy?isAsync=true" \
            -u "${USER}:${PASS}" \
            -H "Content-Type: application/zip" \
            -H "Expect:" \
            --data-binary @backend.zip \
            --max-time 300)
          CODE=$(echo "$RESPONSE" | grep -oP "^HTTP/\S+ \K\d+" | tail -1)
          echo "HTTP ${CODE}"
          [[ "$CODE" != "202" ]] && { echo "Submission failed"; exit 1; }

          # Poll the status URL until done
          POLL_URL=$(echo "$RESPONSE" | grep -i "^location:" | grep -oP "https://[^\r]+")
          echo "Polling: $POLL_URL"
          for i in $(seq 1 60); do
            STATUS=$(curl -s -u "${USER}:${PASS}" "$POLL_URL" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',0))" 2>/dev/null || echo "0")
            echo "  status=${STATUS}"
            [[ "$STATUS" == "4" ]] && { echo "Deployment succeeded"; exit 0; }
            [[ "$STATUS" == "3" ]] && { echo "Deployment failed"; exit 1; }
            sleep 10
          done
          echo "Timed out waiting for deployment"; exit 1

  # ── Deploy Frontend ─────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (React + Express)
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.BACKEND_URL }}
        run: npm run build

      - name: Prune dev dependencies
        working-directory: frontend
        run: npm prune --production

      - name: Create deployment package
        run: |
          cd frontend
          zip -r ../frontend.zip \
            dist/ \
            server.cjs \
            package.json \
            node_modules/

      - name: Deploy to App Service
        env:
          PROFILE: ${{ secrets.FRONTEND_PUBLISH_PROFILE }}
        run: |
          SCM=$(echo "$PROFILE" | grep -oP 'publishUrl="\K[^"]+' | head -1 | sed 's/:443//')
          USER=$(echo "$PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
          PASS=$(echo "$PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)

          echo "Submitting deployment..."
          RESPONSE=$(curl -si -X POST \
            "https://${SCM}/api/zipdeploy?isAsync=true" \
            -u "${USER}:${PASS}" \
            -H "Content-Type: application/zip" \
            -H "Expect:" \
            --data-binary @frontend.zip \
            --max-time 300)
          CODE=$(echo "$RESPONSE" | grep -oP "^HTTP/\S+ \K\d+" | tail -1)
          echo "HTTP ${CODE}"
          [[ "$CODE" != "202" ]] && { echo "Submission failed"; exit 1; }

          POLL_URL=$(echo "$RESPONSE" | grep -i "^location:" | grep -oP "https://[^\r]+")
          echo "Polling: $POLL_URL"
          for i in $(seq 1 60); do
            STATUS=$(curl -s -u "${USER}:${PASS}" "$POLL_URL" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',0))" 2>/dev/null || echo "0")
            echo "  status=${STATUS}"
            [[ "$STATUS" == "4" ]] && { echo "Deployment succeeded"; exit 0; }
            [[ "$STATUS" == "3" ]] && { echo "Deployment failed"; exit 1; }
            sleep 10
          done
          echo "Timed out waiting for deployment"; exit 1
