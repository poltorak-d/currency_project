services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-currency}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-currency_secret}
      POSTGRES_DB: ${POSTGRES_DB:-currency_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-currency} -d ${POSTGRES_DB:-currency_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-currency}:${POSTGRES_PASSWORD:-currency_secret}@postgres:5432/${POSTGRES_DB:-currency_db}
      REDIS_URL: redis://redis:6379/0
      NBP_API_BASE_URL: https://api.nbp.pl/api
      NBP_REQUEST_TIMEOUT: 10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    # API requests go through nginx proxy to backend

volumes:
  postgres_data:
